<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinywave</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: #020617;
      border-bottom: 2px solid #00ffcc;
    }

    .left {
      color: #00ffcc;
      font-weight: bold;
    }

    .middle button {
      margin: 0 5px;
      padding: 8px 12px;
      background: #1e293b;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .right {
      text-align: right;
      font-size: 12px;
    }

    .content {
      text-align: center;
      padding: 40px;
    }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: #020617;
      border-top: 2px solid #00ffcc;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="left">Shinywave</div>

  <div class="middle">
    <button onclick="page('about')">About</button>
    <button onclick="page('more')">More</button>
  </div>

  <div class="right">
    Guest<br>New User
  </div>
</div>

<div class="content" id="content">
  <h1>Welcome To My First Website</h1>
</div>

<div class="footer">
  Powered by Shinywave
</div>

<script>
function page(p){
  let c = document.getElementById("content");
  if(p=="about") c.innerHTML="<h1>About</h1>";
  if(p=="more") c.innerHTML="<h1>More</h1>";
}
</script>

</body>
</html>
