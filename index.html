<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinywave Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: #020617;
      border-bottom: 2px solid #00ffcc;
    }

    .left {
      color: #00ffcc;
      font-weight: bold;
    }

    .middle button {
      margin: 0 5px;
      padding: 8px 12px;
      background: #1e293b;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .middle button:hover {
      background: #00ffcc;
      color: black;
    }

    .right {
      text-align: right;
      font-size: 12px;
    }

    .content {
      text-align: center;
      padding: 40px;
      transition: all 0.4s ease;
      opacity: 1;
    }

    /* ANIMATION */
    .fade-out {
      opacity: 0;
      transform: translateY(20px);
    }

    .fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    /* UPDATE BOX */
    .box {
      margin: 20px auto;
      padding: 15px;
      width: 250px;
      background: #1e293b;
      border-radius: 10px;
      border: 2px solid #00ffcc;
    }

    .box-title {
      font-weight: bold;
      border-bottom: 1px solid #00ffcc;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: #020617;
      border-top: 2px solid #00ffcc;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="left">Shinywave</div>

  <div class="middle">
    <button onclick="page('about')">About</button>
    <button onclick="page('updates')">Updates</button>
    <button onclick="page('settings')">Settings</button>
  </div>

  <div class="right">
    Guest<br>New User
  </div>
</div>

<div class="content" id="content">
  <h1>Welcome To My First Website 👋</h1>
</div>

<div class="footer">
  Powered by Shinywave
</div>

<script>
function page(p){
  let c = document.getElementById("content");

  // fade out
  c.classList.add("fade-out");

  setTimeout(() => {

    if(p=="about"){
      c.innerHTML = "<h1>About</h1><p>This is about Shinywave 😎</p>";
    }

    if(p=="updates"){
      c.innerHTML = `
        <h1>Updates</h1>

        <div class="box">
          <div class="box-title">Update V2.4</div>
          TesT
        </div>

        <div class="box">
          <div class="box-title">Update V2.3</div>
          Added new UI
        </div>

        <div class="box">
          <div class="box-title">Update V2.2</div>
          Bug fixes
        </div>
      `;
    }

    if(p=="settings"){
      c.innerHTML = `
        <h1>Settings</h1>
        <p>More settings coming soon ⚙️</p>
        <button onclick="alert('Dark mode already enabled 😎')">Toggle Theme</button>
      `;
    }

    // fade in
    c.classList.remove("fade-out");
    c.classList.add("fade-in");

  }, 200);
}
</script>

</body>
</html>
